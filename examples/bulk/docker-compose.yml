services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: fibonacci_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -d fibonacci_db -c '\\q'"]
      interval: 5s
      timeout: 5s
      retries: 5
